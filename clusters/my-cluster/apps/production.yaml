---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whack-a-pod-production
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: whack-a-pod-staging
  path: ./k8s/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: fluxv2-demo-app
  targetNamespace: whack-a-pod
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: whack-a-pod
      namespace: whack-a-pod
  timeout: 2m
