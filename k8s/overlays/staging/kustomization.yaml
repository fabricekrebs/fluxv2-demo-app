apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: whack-a-pod
resources:
  - ../base
patches:
  - target:
      kind: Deployment
      name: whack-a-pod
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "1.0.0-staging"
