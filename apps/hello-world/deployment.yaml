apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: demo-hello-world-latest
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          command:
            - /bin/sh
            - '-c'
          args:
            - >-
              echo "Hello World (latest)" > /usr/share/nginx/html/index.html &&
              nginx -g "daemon off;"
          resources: {}
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
